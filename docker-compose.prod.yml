# Prod overrides — merge with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build -d

services:

  fastapi:
    volumes:
      # Bind-mount ML models from EC2 host directory (downloaded from S3)
      - ./backend/ml/saved_models:/app/ml/saved_models:ro
    environment:
      UVICORN_WORKERS: "4"   # increase workers for production load
      ML_MODELS_DIR: /app/ml/saved_models
      PYTHONUNBUFFERED: 1

  nginx:
    image: nginx:alpine
    networks: [agrisense-net]
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_healthy
      fastapi:
        condition: service_healthy
      nodejs:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO/dev/null http://localhost/ 2>&1 && exit 0 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
