listener 1883

# Authentication: anonymous access disabled. Credentials live in the
# password file, which is generated at container start from the
# MQTT_USERNAME / MQTT_PASSWORD environment variables (see docker-compose).
allow_anonymous false
password_file /mosquitto/config/passwd

persistence true
persistence_location /mosquitto/data/

log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
