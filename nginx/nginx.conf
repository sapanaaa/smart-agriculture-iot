# NOTE: We intentionally do NOT use `upstream { server name; }` blocks.
# nginx resolves those hostnames only once at startup and caches the IP
# forever. When a container is recreated/restarted it can get a new IP,
# leaving nginx dialing a stale address ("connect() failed (111) Connection
# refused"). Instead we resolve the Docker service names at request time via
# Docker's embedded DNS (127.0.0.11) + variables in proxy_pass. Because a
# variable proxy_pass does not auto-append the path, we add $request_uri so
# the full original path + query string is forwarded unchanged.

# HTTP - Redirect to HTTPS
server {
    listen 80;
    server_name smartagri.cloudcoesis.com;

    # Lightweight health endpoint for the container healthcheck — plain HTTP,
    # no redirect, no TLS, no upstream dependency. Reflects "nginx is serving".
    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS - Main server
server {
    listen 443 ssl http2;
    server_name smartagri.cloudcoesis.com;

    # SSL certificates
    ssl_certificate /etc/letsencrypt/live/smartagri.cloudcoesis.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/smartagri.cloudcoesis.com/privkey.pem;

    # SSL security settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Docker embedded DNS — lets nginx re-resolve service names at runtime so a
    # recreated/restarted container's new IP is picked up automatically.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $upstream_frontend frontend:3000;
    set $upstream_fastapi  fastapi:8000;
    set $upstream_nodejs   nodejs:5000;

    # ── NodeJS auth + user-management routes ─────────────────
    location = /api/userOnboarding {
        proxy_pass         http://$upstream_nodejs$request_uri;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location = /api/settingCookies {
        proxy_pass         http://$upstream_nodejs$request_uri;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location = /api/me {
        proxy_pass         http://$upstream_nodejs$request_uri;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Account auth (register / verify / login) → NodeJS
    # NOTE: must NOT be /api/auth/* — that namespace belongs to NextAuth
    # which is served by the Next.js frontend.
    location /api/account/ {
        proxy_pass         http://$upstream_nodejs$request_uri;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Admin (RBAC user management) → NodeJS
    location /api/admin/ {
        proxy_pass         http://$upstream_nodejs$request_uri;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── FastAPI routes ───────────────────────────────────────
    location /api/sensors/ {
        proxy_pass         http://$upstream_fastapi$request_uri;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /api/recommend/ {
        proxy_pass         http://$upstream_fastapi$request_uri;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /api/analytics/ {
        proxy_pass         http://$upstream_fastapi$request_uri;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api/weather/ {
        proxy_pass         http://$upstream_fastapi$request_uri;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass         http://$upstream_fastapi$request_uri;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Next.js frontend (catch-all) ─────────────────────────
    location / {
        proxy_pass         http://$upstream_frontend$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
