networks:
  agrisense-net:
    driver: bridge

volumes:
  mosquitto_data:
  mosquitto_log:

services:

  # ── MQTT Broker ────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    networks: [agrisense-net]
    restart: unless-stopped
    ports:
      - "1883:1883"          # always exposed — ESP32 hardware on LAN needs this
    env_file: ./backend/.env   # provides MQTT_USERNAME / MQTT_PASSWORD (shared with fastapi)
    # Generate the password file from env at startup (so no hashed secret is
    # committed), then start the broker. $$ escapes to $ for the container shell.
    command:
      - /bin/sh
      - -c
      - >-
        if [ -n "$$MQTT_USERNAME" ]; then
        rm -f /mosquitto/config/passwd;
        mosquitto_passwd -b -c /mosquitto/config/passwd "$$MQTT_USERNAME" "$$MQTT_PASSWORD" &&
        chmod 0700 /mosquitto/config/passwd &&
        chown mosquitto:mosquitto /mosquitto/config/passwd;
        fi;
        exec /usr/sbin/mosquitto -c /mosquitto/config/mosquitto.conf
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL",
             "mosquitto_pub -h localhost -p 1883 -u $$MQTT_USERNAME -P $$MQTT_PASSWORD -t health/check -m ping -q 0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Python FastAPI (ML + sensors + weather) ────────────────
  fastapi:
    build:
      context: ./backend
      dockerfile: Dockerfile
    networks: [agrisense-net]
    restart: unless-stopped
    ports:
      - "8000:8000"          # expose to host for local dev
    env_file: ./backend/.env
    environment:
      MQTT_BROKER_HOST: mosquitto       # override localhost → service name
    volumes:
      - ./backend/ml/saved_models:/app/ml/saved_models  # host bind-mount
    depends_on:
      mosquitto:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s      # ML model loading takes ~30-60s on first start

  # ── NodeJS Express (auth + user management) ────────────────
  nodejs:
    build:
      context: ./NodeJSbackend
      dockerfile: Dockerfile
    networks: [agrisense-net]
    restart: unless-stopped
    ports:
      - "5000:5000"          # expose to host for local dev
    env_file: ./NodeJSbackend/.env
    environment:
      MLSERVER_URL: http://fastapi:8000   # override localhost → service name
      # Keep localhost:3000 for browser requests from host machine
      # FRONTEND_URL stays as defined in .env file (localhost:3000)
    depends_on:
      fastapi:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e",
             "const h=require('http');h.get('http://localhost:5000/',r=>{process.exit(r.statusCode<500?0:1)}).on('error',_=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Next.js Frontend ───────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner                      # prod: standalone build
    networks: [agrisense-net]
    restart: unless-stopped
    ports:
      - "3000:3000"          # expose to host for local dev
    env_file: ./frontend/.env.local
    environment:
      BACKEND: http://nodejs:5000         # server-side SSR calls (NextAuth authorize)
      NODEJS_URL: http://nodejs:5000      # next.config rewrites → NodeJS upstream
      FASTAPI_URL: http://fastapi:8000    # next.config rewrites → FastAPI upstream
    depends_on:
      nodejs:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e",
             "const h=require('http');h.get('http://localhost:3000/',r=>{process.exit(r.statusCode<500?0:1)}).on('error',_=>process.exit(1))"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s
